<script>
  'use strict'
  var stageId = 0;
  var stageOKList = {
    num: 0n,
    load() {
      if (document.cookie.length) {
        let s = document.cookie.substring(3);
        for (let i of s) {
          this.num = this.num * 16n + BigInt("0123456789abcdef".indexOf(i));
        }
      }
    },
    save() {
      document.cookie = `ok=${this.num.toString(16)}; Secure; expires=Fri, 31 Dec 9999 23:59:59 GMT; path=/;`;
    },
    get(id) { return (this.num >> BigInt(id) & 1n) === 1n; },
    set(id) { if (!this.get(id)) { this.num |= 1n << BigInt(id); this.save(); } },
    clear() { if (this.num != 0n) { this.num = 0n; this.save(); } }
  };
  var stage = null;
  var stageList = [];
</script>

<script>
  window.onload = () => {
    stageId = 0;
    stageOKList.load();
    stageList[stageId](stageId);
  };
  document.onkeydown = (event) => {
    // print(event.key);
    var press = function () {
      for (let i of arguments) if (event.key === i) return true;
      return false;
    };
    if (press("Backspace", "Escape")) {
      backEvent();
    } else if (press("r")) {
      restartEvent();
    } else if (press("ArrowRight", "d")) {
      stage.dirKeyDown(0, 1, 0, [0, 1]);
    } else if (press("ArrowUp", "w")) {
      stage.dirKeyDown(-1, 0, 1, [-1, 0]);
    } else if (press("ArrowLeft", "a")) {
      stage.dirKeyDown(0, -1, 2, [0, -1]);
    } else if (press("ArrowDown", "s")) {
      stage.dirKeyDown(1, 0, 3, [1, 0]);
    }
  }
  function backEvent() {
    if (stageId === 0) {
      // window.close();
      window.location.href = "https://axiomofchoice-hjt.github.io/pages/62c303/"
    } else {
      stageId = 0;
      stageList[stageId](stageId);
    }
  }
  function restartEvent() {
    if (stageId === 0) {
      if (confirm("清除所有记录？")) {
        stageOKList.clear();
        stage.update();
        stage.show();
      }
    } else {
      stageList[stageId](stageId);
    }
  }
  function infoEvent() {
  }
</script>
